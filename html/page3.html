<!DOCTYPE html>
<html lang="vi">
	<head>
		<title>Thiết kế trang đăng ký tài khoản</title>		
		<meta charset = "utf-8">
        <link href="../css/style3.css" rel="StyleSheet">
	</head>
	
	<body>
		<div class="container">
            <form class="frmLogin">
                <h3>Đăng Ký Thông Tin</h3>
                <div class="frmTxt">
                    <label for = "txtName">Họ và tên:</label>
                    <input type="text" class="control" id="txtName" name="txtName" placeholder="Nhập tên của bạn">
                </div>
                 <div class="frmTxt">
                    <label for = "txtMSSV">Mã số sinh viên:</label>
                    <input type="text" class="control" id="txtMSSV" name="txttxtMSSV" placeholder="Nhập mã số sinh viên">
                </div>

                <div class="frmTxt">
                    <label for="ngSinh">Ngày sinh:</label>
                    <input type="date" class="control" id="ngSinh" name="ngSinh">
                </div>

                <div class="frmTxt">
                    <label for="Radio1">Giới tính:</label>
                    <input type="radio" class="control" id="radio1" name="radio1" value="Name" title="Nam"> Nam
                    <input type="radio" class="control" id="radio2" name="radio1" value="Nữ" title="Nữ"> Nữ
                </div>
                <div class="frmTxt">
                    <label for="txtPhone">Số điện thoại: </label>
                    <input type="text" class="control" id="txtPhone" name="txtPhone" placeholder="Nhập số điện thoại">
                </div>
                <div class="frmTxt" id="checkbox">
                    <label for="checkbox1">Điểm mạnh:</label>
                    <div class="option"><input type="checkbox" class="control" id="checkbox1" name="checkbox" value="Back-end" title="Back-end"> Back-end</div>
                    <div class="option"><input type="checkbox" class="control" id="checkbox2" name="checkbox" value="Front-end" title="Front-end"> Front-end</div>
                    <div class="option"><input type="checkbox" class="control" id="checkbox3" name="checkbox" value="Database" title="Database"> Database</div>
                </div>

                <div>
                    <label for="">Sở thích:</label>
                    <input type="text" class="control" id="txtInterested" name="txtInterested" placeholder="Sở thích của bạn là gì?">
                </div>

                <div class="buttons">
                    <input class="Button" type="submit" id="sbRegister" value="Đăng ký">
                </div>
                
            </form>
        </div>
	</body>	
</html>
