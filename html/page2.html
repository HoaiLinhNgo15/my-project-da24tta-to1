<!DOCTYPE html>
<html lang="vi">
	<head>
		<title>Thiết kế trang đăng nhập hệ thống</title>		
		<meta charset = "utf-8">
        <link href="../css/style2.css" rel="StyleSheet">
	</head>
	
	<body>
		<div class="container">
            <form class="frmLogin">
                <h3>Đăng Nhập Hệ Thống</h3>
                <div class="frmTxt">
                    <label for="txtUserName">Tên đăng nhập:</label>
                    <input type="text" class="control" id="txtUserName" name="txtUserName" placeholder="Tên đăng nhập của bạn">
                </div>
                <div class="frmTxt">
                    <label id="Password" for="txtUserPassword">Mật khẩu:</label>
                    <input type="password" class="control" id="txtUserPassword" name="txtUserPassword" placeholder="Mật khẩu của bạn">
                </div>
                <div class="buttons">
                    <input class="Button" type="submit" id="sbLogin" value="Đăng nhập">
                    <input class="Button" type="submit" id="sbCancel" value="Nhập lại">
                </div>
                <a id="Register" href="page3.html">Đăng ký</a>
                
            </form>
        </div>
	</body>	
</html>
