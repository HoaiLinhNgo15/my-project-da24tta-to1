<!DOCTYPE html>
<html lang="vi">
	<head>
		<title>Thiết kế trang tính học phí</title>		
		<meta charset = "utf-8">
        <link href="#" rel="StyleSheet">
	</head>
	
	<body>
        <div class="container">
            <input type="button" value="Thêm" onclick="Add()">
        </div>
		
        <script>
           function Add() {
            const myRow = document.createElement("div");
            myRow.setAttribute("class", "Row");

            const mySubject = document.createElement("input");
            const myTinchi = document.createElement("input");
            const mySelect = document.createElement("select");

            mySubject.setAttribute("type","text");
            mySubject.setAttribute("name", "sb");
            mySubject.setAttribute("id", "sb");
            mySubject.setAttribute("placeholder", "Nhập tên môn");
            
            myTinchi.setAttribute("type", "text");
            myTinchi.setAttribute("name", "tinchi");
            myTinchi.setAttribute("id", "tinchi"); 
            myTinchi.setAttribute("placeholder", "Nhập số tín chỉ");

            mySelect.setAttribute("class","select1");
            const option1 = document.createElement("option");
            const option2 = document.createElement("option");

            option1.setAttribute("value","Cơ sở ngành");
            const textOption1 = document.createTextNode("Cơ sở ngành");
            option1.appendChild(textOption1);

            option2.setAttribute("value","Chuyên ngành");
            option2.setAttribute("selected", null);
            const textOption2 = document.createTextNode("Chuyên ngành");
            option2.appendChild(textOption2);

            mySelect.appendChild(option1);
            mySelect.appendChild(option2);

            myRow.appendChild(mySubject);
            myRow.appendChild(myTinchi);
            myRow.appendChild(mySelect);
            
            document.getElementsByClassName("container")[0].appendChild(myRow);
            //dùng document.querySelector(".container").appendChild(myRow);
            //hoặc dùng document.querySelectorAll(".container")[0].appendChild(myRow);
           }
        </script>
	</body>	
</html>
